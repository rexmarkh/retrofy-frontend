<nz-card 
  class="organization-card hover:shadow-lg transition-shadow cursor-pointer relative"
  (click)="onCardClick()"
>
  <!-- Actions (Settings / Delete) - Top Right Corner -->
  <div style="position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 4px; z-index: 10;">
    <button 
      nz-button 
      nzType="text" 
      nzSize="small" 
      (click)="$event.stopPropagation(); onSettings()"
      class="text-gray-400 hover:text-[#7954AA] transition-colors p-1 flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100"
      nz-tooltip
      nzTooltipTitle="Organization Settings"
    >
      <span nz-icon nzType="setting" nzTheme="outline" class="text-base"></span>
    </button>
    <button 
      nz-button 
      nzType="text" 
      nzSize="small" 
      (click)="$event.stopPropagation(); onDelete()"
      class="text-gray-400 hover:text-red-500 transition-colors p-1 flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100"
      nz-tooltip
      nzTooltipTitle="Delete Organization"
    >
      <span nz-icon nzType="delete" nzTheme="outline" class="text-base"></span>
    </button>
  </div>

  <nz-card-meta
    [nzTitle]="titleTemplate"
    [nzDescription]="organization.description"
  ></nz-card-meta>

  <ng-template #titleTemplate>
    <div class="pr-24">
      {{ organization.name }}
    </div>
  </ng-template>
  
  <div class="mt-4 space-y-3">
    <!-- Organization Stats -->
    <div class="flex items-center justify-between">
      <nz-tag [nzColor]="getVisibilityColor()">
        {{ getVisibilityLabel() }}
        <span nz-icon [nzType]="getVisibilityIcon()" nzTheme="outline"></span>
      </nz-tag>
      <span class="text-xs text-gray-500">
        {{ getTimeAgo() }}
      </span>
    </div>

    <!-- Members and Teams Count -->
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4 text-sm text-gray-600">
        <span class="flex items-center gap-1">
          <span nz-icon nzType="team" nzTheme="outline"></span>
          {{ organization.memberCount }} member{{ organization.memberCount !== 1 ? 's' : '' }}
        </span>
        <span class="flex items-center gap-1">
          <span nz-icon nzType="apartment" nzTheme="outline"></span>
          {{ organization.teamCount }} team{{ organization.teamCount !== 1 ? 's' : '' }}
        </span>
      </div>
    </div>

    <!-- Owner Info -->
    <div class="text-xs text-gray-500">
      <span>Created {{ formatDate() }}</span>
    </div>
  </div>





</nz-card>
