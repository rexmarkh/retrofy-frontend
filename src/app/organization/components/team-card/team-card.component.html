<div 
  class="bg-white rounded-xl overflow-hidden transition-all duration-300 h-full flex flex-col relative"
  [class.hover:shadow-lg]="team.isMember"
  [class.hover:-translate-y-1]="team.isMember"
  [class.cursor-pointer]="team.isMember"
  [class.cursor-not-allowed]="!team.isMember"
  [class.opacity-50]="!team.isMember"
  [class.grayscale]="!team.isMember"
  style="border: 1px solid #edf2f7; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);"
  (click)="team.isMember && onCardClick()"
  [nz-tooltip]="!team.isMember ? 'You do not have access to this team' : ''"
  nzTooltipPlacement="top"
>
  <!-- Card Body -->
  <div class="p-6 flex flex-col flex-grow">
    <!-- Actions (Edit / Delete) - Top Right Corner -->
    <div style="position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 4px; z-index: 10;" *ngIf="team.isMember">
      <button 
        nz-button 
        nzType="text" 
        nzSize="small" 
        (click)="$event.stopPropagation(); onEdit()"
        class="text-gray-400 hover:text-[#7954AA] transition-colors p-1 flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100"
      >
        <span nz-icon nzType="edit" nzTheme="outline" class="text-base"></span>
      </button>
      <button 
        nz-button 
        nzType="text" 
        nzSize="small" 
        (click)="$event.stopPropagation(); onDelete()"
        class="text-gray-400 hover:text-red-500 transition-colors p-1 flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100"
      >
        <span nz-icon nzType="delete" nzTheme="outline" class="text-base"></span>
      </button>
    </div>

    <!-- Card Title, Logo and Description -->
    <div class="flex items-start gap-4 flex-grow mb-8">
      <div class="w-10 h-10 bg-gray-50 flex items-center justify-center text-[#7954aa] text-[14px] font-bold rounded-sm uppercase border border-gray-100 flex-shrink-0">
        {{ getInitials(team.name) }}
      </div>
      <div class="pt-0.5 min-w-0 flex-grow">
        <h3 class="text-[17px] font-bold text-gray-900 leading-tight mb-2 truncate pr-16" [nz-tooltip]="team.name.length > 25 ? team.name : ''">
          {{ team.name }}
        </h3>
        <p class="text-[13px] text-gray-500 line-clamp-2 m-0 leading-relaxed pr-8" [nz-tooltip]="(team.description?.length || 0) > 80 ? team.description : ''">
          {{ team.description || 'No description provided' }}
        </p>
      </div>
    </div>

    <!-- Team Metrics -->
    <div class="flex items-center gap-8">
      <div class="flex flex-col gap-1.5">
        <span class="text-[10px] font-bold text-gray-400 tracking-wider">MEMBERS</span>
        <div class="flex items-center gap-2">
          <span nz-icon nzType="team" nzTheme="outline" class="text-[#7954AA] text-lg"></span>
          <span class="font-bold text-gray-900 text-[15px]">{{ team.memberCount }}</span>
        </div>
      </div>
      <div class="flex flex-col gap-1.5">
        <span class="text-[10px] font-bold text-gray-400 tracking-wider">BOARDS</span>
        <div class="flex items-center gap-2">
          <span nz-icon nzType="appstore" nzTheme="outline" class="text-[#7954AA] text-lg"></span>
          <span class="font-bold text-gray-900 text-[15px]">{{ team.boardCount }}</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer (Edge-to-Edge Border) -->
  <div class="px-6 py-4 border-t border-gray-100 bg-[#fafafa]">
    <div class="flex items-center gap-2 text-[10px] font-bold text-gray-500 uppercase tracking-wider">
      <span nz-icon nzType="calendar" nzTheme="outline"></span>
      <span>Created {{ formatDate() }}</span>
    </div>
  </div>
</div>
