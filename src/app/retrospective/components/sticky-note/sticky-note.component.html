<div 
  class="sticky-note" 
  [style.background-color]="getBackgroundColor()"
  [style.border-left]="'4px solid ' + getBorderColor()"
  [class.opacity-75]="!canEdit() && !canDelete()"
  [class.cdk-drag-disabled]="!canDrag()"
>
  <nz-card 
    [nzBordered]="false"
    [nzBodyStyle]="{ padding: '0.5rem', backgroundColor: 'transparent' }"
    class="h-full"
  >
    <!-- Action Buttons - Top Right -->
    <div class="absolute top-2 right-2 flex items-center gap-1 action-buttons z-10">
      <!-- Color Picker -->
      <nz-popover 
        *ngIf="canEdit()"
        nzTitle="Change Color" 
        nzTrigger="click"
      >
        <button 
          nz-button 
          nzType="text" 
          nzSize="small"
          nz-popover
          nz-tooltip
          nzTooltipTitle="Change color"
          class="action-button"
        >
          <span nz-icon nzType="bg-colors" nzTheme="outline"></span>
        </button>
        <ng-template #nzPopoverContent>
          <div class="grid grid-cols-3 gap-2 p-2">
            <div 
              *ngFor="let color of colorOptions"
              class="w-7 h-7 rounded cursor-pointer border-2 hover:scale-110 transition-transform"
              [style.background-color]="getColorValue(color)"
              [class.border-gray-800]="note.color === color"
              [class.border-gray-300]="note.color !== color"
              (click)="changeColor(color)"
            ></div>
          </div>
        </ng-template>
      </nz-popover>

      <!-- Edit Icon -->
      <button 
        *ngIf="canEdit()"
        nz-button 
        nzType="text" 
        nzSize="small"
        (click)="startEditing()"
        nz-tooltip
        nzTooltipTitle="Edit note"
        nzTooltipPlacement="bottom"
        class="action-button"
      >
        <span nz-icon nzType="edit" nzTheme="outline"></span>
      </button>

      <!-- Delete Icon -->
      <button 
        *ngIf="canDelete()"
        nz-button 
        nzType="text" 
        nzSize="small"
        (click)="confirmDelete()"
        nz-tooltip
        nzTooltipTitle="Delete note"
        nzTooltipPlacement="bottom"
        class="action-button action-button-delete"
      >
        <span nz-icon nzType="delete" nzTheme="outline"></span>
      </button>
    </div>

    <!-- Note Content - Takes most space -->
    <div class="note-content-wrapper">
      <div class="note-content" #contentElement>
        {{ note.content }}
      </div>
      <div *ngIf="isTruncated" (click)="showFullNote()" class="show-more-link">
        Show more
      </div>
    </div>

    <!-- Single Row Footer - Tags + Metadata -->
    <div class="note-footer">
      <!-- Left: Note ID + Tags -->
      <div class="footer-left">
        <!-- Note ID -->
        <span class="note-id">NT-{{ note.noteNumber }}</span>
        
        <!-- Tags (if present) -->
        <div *ngIf="note.tags && note.tags.length > 0" class="note-tags-inline">
          <span 
            *ngFor="let tag of note.tags" 
            class="note-tag"
            [style.background-color]="getTagBackgroundColor(tag)"
            [style.color]="getTagTextColor(tag)"
          >
            {{ tag }}
          </span>
        </div>
      </div>

      <!-- Right: User + Vote -->
      <div class="footer-right">
        <!-- User Avatar with tooltip -->
        <ng-container *ngIf="shouldShowAuthor()">
          <j-avatar 
            [avatarUrl]="note.authorAvatar" 
            [name]="note.authorName"
            [size]="16"
            className="avatar-small"
            nz-tooltip
            [nzTooltipTitle]="note.authorName"
            nzTooltipPlacement="top"
          ></j-avatar>
        </ng-container>
        <ng-container *ngIf="shouldShowAnonymous()">
          <div 
            class="anonymous-avatar"
            nz-tooltip
            nzTooltipTitle="Anonymous"
            nzTooltipPlacement="top"
          >
            <span nz-icon nzType="user" nzTheme="outline"></span>
          </div>
        </ng-container>

        <!-- Vote Button -->
        <button 
          nz-button 
          nzType="text" 
          nzSize="small"
          [class.vote-button-active]="hasUserVoted()"
          [class.vote-button]="!canVote()"
          [disabled]="!canVote()"
          (click)="onVote()"
          class="flex items-center gap-1"
          nz-tooltip
          [nzTooltipTitle]="!canVote() ? 'Voting is not allowed' : 'Vote on this note'"
          nzTooltipPlacement="top"
        >
          <span class="text-xs font-semibold">{{ note.votes }}</span>
          <span 
            nz-icon 
            nzType="like" 
            [nzTheme]="hasUserVoted() ? 'fill' : 'outline'"
            class="vote-icon"
          ></span>
        </button>

        <!-- Completion Indicator (Discussion Phase Only + Not in Action Items) -->
        <button 
          *ngIf="currentPhase === 'discussion' && note.columnId !== 'action-items'"
          nz-button 
          nzType="text" 
          nzSize="small"
          [disabled]="!canMarkAsCompleted()"
          (click)="toggleCompleted(); $event.stopPropagation()"
          class="completion-toggle-btn"
          [class.completed]="note.isCompleted"
          nz-tooltip
          [nzTooltipTitle]="note.isCompleted ? 'Discussion completed' : 'Mark as complete'"
          nzTooltipPlacement="top"
        >
          <span 
            nz-icon 
            [nzType]="note.isCompleted ? 'check-circle' : 'check'" 
            [nzTheme]="note.isCompleted ? 'fill' : 'outline'"
            class="completion-icon"
          ></span>
        </button>
      </div>
    </div>
  </nz-card>

<!-- Note Detailed View Modal Template -->
<ng-template #noteModalContent>
  <div class="premium-note-modal-content">
    <div class="modal-note-body">
      {{ note.content }}
    </div>
    
    <div class="modal-note-footer">
      <div class="footer-left">
        <span class="note-id">NT-{{ note.noteNumber }}</span>
        <div *ngIf="note.tags && note.tags.length > 0" class="note-tags-inline">
          <span *ngFor="let tag of note.tags" 
                class="note-tag" 
                [style.background-color]="getTagBackgroundColor(tag)"
                [style.color]="getTagTextColor(tag)">
            {{ tag }}
          </span>
        </div>
      </div>

      <div class="footer-right">
        <div class="author-info">
          <ng-container *ngIf="shouldShowAuthor(); else anonymousTpl">
            <img [src]="note.authorAvatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + note.authorId" class="modal-avatar" />
            <span class="author-name">{{ note.authorName }}</span>
          </ng-container>
          <ng-template #anonymousTpl>
            <div class="modal-avatar anonymous-placeholder">👤</div>
            <span class="author-name">Anonymous</span>
          </ng-template>
        </div>
        
        <div class="modal-vote-badge">
          <span>{{ note.votes }}</span>
          <span class="vote-icon">👍</span>
        </div>
      </div>
    </div>
  </div>
</ng-template>
</div>
