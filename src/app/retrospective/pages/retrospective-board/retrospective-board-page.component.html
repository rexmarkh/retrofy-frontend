  <div class="grid-stack h-full">
      <!-- Board Content -->
    <div class="stack-item retrospective-board h-full">
      <!-- Loading Skeleton (Header & Columns) -->
      <ng-container *ngIf="(isLoading$ | async) && !currentBoard">
        <nz-layout class="h-full">
          <nz-header class="bg-white border-b border-gray-200 px-6 h-auto py-4">
            <div class="flex items-center justify-between mb-4">
              <div class="flex flex-col gap-2">
                <nz-skeleton-element nzType="input" [nzActive]="true" style="width: 250px; height: 32px;"></nz-skeleton-element>
                <nz-skeleton-element nzType="input" [nzActive]="true" style="width: 400px; height: 16px;"></nz-skeleton-element>
              </div>
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                  <nz-skeleton-element nzType="avatar" [nzActive]="true" nzSize="small"></nz-skeleton-element>
                  <nz-skeleton-element nzType="avatar" [nzActive]="true" nzSize="small"></nz-skeleton-element>
                </div>
              </div>
            </div>
            <!-- Phase Nav Skeleton -->
            <div class="flex items-center justify-center py-4">
              <nz-skeleton-element nzType="button" [nzActive]="true" style="width: 100%; height: 40px; border-radius: 20px;"></nz-skeleton-element>
            </div>
          </nz-header>
          <nz-content class="p-4 h-full bg-[#f1f5f9]">
            <div class="flex gap-4 h-full overflow-hidden">
              <div *ngFor="let _ of [1,2,3]" class="flex-1 bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex flex-col gap-4">
                <div class="flex justify-between items-center mb-4">
                  <nz-skeleton-element nzType="input" [nzActive]="true" style="width: 120px; height: 24px;"></nz-skeleton-element>
                  <nz-skeleton-element nzType="button" [nzActive]="true" nzSize="small" style="width: 40px;"></nz-skeleton-element>
                </div>
                <div *ngFor="let __ of [1,2,3]" class="p-4 border rounded-xl">
                  <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 2 }" [nzTitle]="false"></nz-skeleton>
                </div>
              </div>
            </div>
          </nz-content>
        </nz-layout>
      </ng-container>

      <!-- Actual Board -->
      <nz-layout class="h-full" *ngIf="currentBoard">
        <nz-header class="bg-white border-b border-gray-200 px-6 h-auto py-4">
          <!-- Top Row: Title & Actions -->
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-4">
              <div>
                <h1 class="text-2xl font-bold text-gray-900 mb-1">{{ currentBoard.title }}</h1>
                <p class="text-sm text-gray-500">{{ currentBoard.description }}</p>
              </div>
            </div>

            <div class="flex items-center gap-4">
              <!-- Participants -->
              <div class="flex items-center gap-3 px-1 py-2">
                <span class="text-sm font-medium text-gray-700">Participants :</span>
                <div class="flex items-center -space-x-2" *ngIf="!(isLoading$ | async) || (uniqueParticipants && uniqueParticipants.length > 0); else participantsSkeleton">
                  <j-avatar 
                    *ngFor="let participantId of uniqueParticipants.slice(0, 5); let i = index"
                    [avatarUrl]="getParticipantAvatar(participantId)"
                    [name]="getParticipantName(participantId)"
                    [size]="32"
                    className="relative border-2 border-white rounded-full hover:z-50 transition-transform cursor-pointer"
                    [ngStyle]="{ 'z-index': i + 10 }"
                    nz-tooltip
                    [nzTooltipTitle]="getParticipantName(participantId)"
                    nzTooltipPlacement="bottom"
                  ></j-avatar>
                  <div 
                    *ngIf="uniqueParticipants.length > 5"
                    class="relative z-50 flex items-center justify-center m-8 h-8 rounded-full bg-gray-300 border-2 border-white text-xs font-medium text-white shadow-sm"
                  >
                    +{{ uniqueParticipants.length - 5 }}
                  </div>
                </div>
                <ng-template #participantsSkeleton>
                  <div class="flex items-center -space-x-2">
                    <nz-skeleton-element *ngFor="let _ of [1,2]" nzType="avatar" [nzActive]="true" nzSize="small" nzShape="circle" style="width: 32px; height: 32px; border: 2px solid white;"></nz-skeleton-element>
                  </div>
                </ng-template>
              </div>

            </div>
          </div>

          <!-- Phase Navigation -->
          <div class="phase-navigation flex items-center justify-center px-4 w-full">
            <button 
              nz-button 
              nzType="text" 
              class="phase-nav-btn flex items-center justify-center rounded-full mx-2 transition-colors"
              [disabled]="!canGoToPreviousPhase()"
              (click)="goToPreviousPhase()"
            >
              <span nz-icon nzType="left" nzTheme="outline"></span>
            </button>

            <div class="phase-steps flex-1 w-full">
              <div 
                *ngFor="let phase of retroPhases; let i = index"
                class="phase-step"
                [class.active]="currentBoard.currentPhase === phase"
                [class.completed]="isPhaseCompleted(phase)"
                [class.clickable]="isPhaseClickable(phase)"
                [class.disabled]="!isPhaseClickable(phase) && currentBoard.currentPhase !== phase"
                (click)="isPhaseClickable(phase) && changePhase(phase)"
              >
                <!-- Step Label -->
                <div class="step-content">
                  <div class="step-title flex items-center justify-center gap-1">
                    {{ getPhaseTitle(phase) }}
                    <span 
                      nz-icon 
                      nzType="info-circle" 
                      nzTheme="outline" 
                      class="info-icon"
                      [nz-tooltip]="getPhaseTooltip(phase)"
                      nzTooltipPlacement="bottom"
                    ></span>
                  </div>
                </div>

                <!-- Connector Line -->
                <div *ngIf="i < retroPhases.length - 1" class="step-connector"></div>
              </div>
            </div>

            <button 
              nz-button 
              nzType="text" 
              class="phase-nav-btn flex items-center justify-center rounded-full mx-2 transition-colors"
              [disabled]="!canGoToNextPhase()"
              (click)="goToNextPhase()"
            >
              <span nz-icon nzType="right" nzTheme="outline"></span>
            </button>
          </div>
        </nz-header>

        <!-- Board Content -->
        <nz-content class="overflow-hidden">
          <div class="h-full">
            <!-- Columns Grid -->
            <div 
              class="columns-grid h-full"
              [style.grid-template-columns]="getGridTemplateColumns()"
              cdkDropListGroup
            >
              <ng-container *ngFor="let column of currentBoard.columns; let i = index; trackBy: trackByColumnId">
                <app-retro-column
                  [column]="column"
                  [stickyNotes]="getStickyNotesForColumn(column.id)"
                  [currentUserId]="getCurrentUserId()"
                  [facilitatorId]="currentBoard.facilitatorId"
                  [currentPhase]="currentBoard.currentPhase"
                  [teamAbbreviation]="teamAbbreviation"
                  [currentUserRole]="currentUserRole"
                  [isLoading]="(isLoading$ | async) || false"
                  (noteAdd)="onNoteAdd($event)"
                  (noteChange)="onNoteChange($event)"
                  (noteDelete)="onNoteDelete($event)"
                  (noteVote)="onNoteVote($event)"
                  (noteDrop)="onNoteDrop($event)"
                  class="column-item"
                ></app-retro-column>
                
                <!-- Resizer Handle -->
                <div 
                  *ngIf="i < currentBoard.columns.length - 1" 
                  class="resizer-handle"
                  (mousedown)="onResizeStart($event, i)"
                >
                  <div class="resizer-line"></div>
                </div>
              </ng-container>
            </div>
          </div>
        </nz-content>
      </nz-layout>
    </div>

  </div>
    <nz-modal
      [(nzVisible)]="isPhaseModalVisible"
      nzTitle="Retrospective Phases"
      [nzFooter]="null"
      (nzOnCancel)="cancelPhaseChange()"
      nzWidth="520px"
      nzWrapClassName="premium-modal"
    >
      <ng-container *nzModalContent>
        <div class="phase-form p-2">
          <div class="form-group">
            <label class="label mb-4 block font-bold text-gray-700 uppercase text-[11px] tracking-wider">Current Phase</label>
            <div class="space-y-3">
              <div 
                *ngFor="let phase of phaseOptions" 
                class="flex items-center p-4 border rounded-xl cursor-pointer transition-all duration-200 group"
                [class.bg-purple-50]="selectedPhase === phase.value"
                [class.border-purple-200]="selectedPhase === phase.value"
                [class.hover:bg-gray-50]="selectedPhase !== phase.value"
                (click)="selectedPhase = phase.value"
              >
                <div class="w-10 h-10 flex items-center justify-center rounded-lg mr-4 transition-colors"
                     [ngClass]="selectedPhase === phase.value ? 'bg-purple-100 text-purple-600' : 'bg-gray-100 text-gray-500 group-hover:bg-gray-200'">
                  <span nz-icon [nzType]="phase.icon" nzTheme="outline" class="text-xl"></span>
                </div>
                <div class="flex-1">
                  <div class="font-bold text-gray-900 leading-tight mb-0.5">{{ phase.label }}</div>
                  <div class="text-[12px] text-gray-500">{{ getPhaseDescription(phase.value) }}</div>
                </div>
                <div 
                  *ngIf="selectedPhase === phase.value" 
                  class="w-6 h-6 bg-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-purple-200"
                >
                  <span nz-icon nzType="check" class="text-white text-[10px] font-bold"></span>
                </div>
              </div>
            </div>
          </div>

          <div class="flex justify-end gap-2 mt-8 pt-4 border-t">
            <button nz-button (click)="cancelPhaseChange()">Cancel</button>
            <button nz-button nzType="primary" 
                    [disabled]="selectedPhase === currentBoard?.currentPhase || !canChangePhase()"
                    (click)="updatePhase()" class="bg-[#7954AA]">
              Update Phase
            </button>
          </div>
        </div>
      </ng-container>
    </nz-modal>


    <!-- Step Description Templates -->
    <ng-template #brainstormingDescTemplate>
      <div class="flex items-center gap-1">
        <span>Add your thoughts</span>
        <span 
          nz-icon 
          nzType="info-circle" 
          nzTheme="outline"
          [nz-tooltip]="getPhaseInstructions(RetroPhase.BRAINSTORMING)"
          nzTooltipPlacement="bottom"
          class="text-gray-400 hover:text-blue-500 cursor-help text-xs"
        ></span>
      </div>
    </ng-template>

    <ng-template #groupingDescTemplate>
      <div class="flex items-center gap-1">
        <span>Group similar ideas</span>
        <span 
          nz-icon 
          nzType="info-circle" 
          nzTheme="outline"
          [nz-tooltip]="getPhaseInstructions(RetroPhase.GROUPING)"
          nzTooltipPlacement="bottom"
          class="text-gray-400 hover:text-blue-500 cursor-help text-xs"
        ></span>
      </div>
    </ng-template>

    <ng-template #votingDescTemplate>
      <div class="flex items-center gap-1">
        <span>Vote on priority items</span>
        <span 
          nz-icon 
          nzType="info-circle" 
          nzTheme="outline"
          [nz-tooltip]="getPhaseInstructions(RetroPhase.VOTING)"
          nzTooltipPlacement="bottom"
          class="text-gray-400 hover:text-blue-500 cursor-help text-xs"
        ></span>
      </div>
    </ng-template>

    <ng-template #discussionDescTemplate>
      <div class="flex items-center gap-1">
        <span>Discuss top items</span>
        <span 
          nz-icon 
          nzType="info-circle" 
          nzTheme="outline"
          [nz-tooltip]="getPhaseInstructions(RetroPhase.DISCUSSION)"
          nzTooltipPlacement="bottom"
          class="text-gray-400 hover:text-blue-500 cursor-help text-xs"
        ></span>
      </div>
    </ng-template>
